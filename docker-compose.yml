version: '3.8'

services:
  whatsapp-ai-assistant:
    build: .
    container_name: whatsapp_ai_assistant
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GREEN_API_INSTANCE_ID=${GREEN_API_INSTANCE_ID}
      - GREEN_API_ACCESS_KEY=${GREEN_API_ACCESS_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - WORDPRESS_USERNAME=${WORDPRESS_USERNAME}
      - WORDPRESS_APP_PWD=${WORDPRESS_APP_PWD}
      - WORDPRESS_URL=${WORDPRESS_URL}
      - KNOWLEDGE_BASE_PATH=/app/knowledge_base
      - UPLOAD_TEMP_PATH=/app/temp_uploads
      - LOG_LEVEL=INFO
    volumes:
      - ./knowledge_base:/app/knowledge_base
      - ./temp_uploads:/app/temp_uploads
      - ./logs:/app/logs
      - ./data:/app/data
    env_file:
      - .env
    networks:
      - whatsapp_network

  redis:
    image: redis:7-alpine
    container_name: whatsapp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - whatsapp_network

  nginx:
    image: nginx:alpine
    container_name: whatsapp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - whatsapp-ai-assistant
    networks:
      - whatsapp_network

volumes:
  redis_data:

networks:
  whatsapp_network:
    driver: bridge
